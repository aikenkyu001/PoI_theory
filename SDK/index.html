<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Noetics SDK WASM Demo</title>
    <style>
        body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; padding: 20px; }
        h1 { color: #569cd6; }
        .log { background: #252526; border: 1px solid #333; padding: 15px; border-radius: 5px; min-height: 200px; white-space: pre-wrap; }
        .status { margin-bottom: 10px; font-weight: bold; }
        .success { color: #4ec9b0; }
        .error { color: #f44747; }
    </style>
</head>
<body>
    <h1>Noetics SDK v1.0 - WASM Verification</h1>
    <div id="status" class="status">Loading WASM module...</div>
    <div id="log" class="log"></div>

    <!-- Emscripten generated glue code -->
    <script src="C/noetics.js"></script>
    <!-- Our high-level wrapper -->
    <script src="wasm_noetics.js"></script>

    <script>
        const logElement = document.getElementById('log');
        const statusElement = document.getElementById('status');

        function log(message, type = '') {
            const span = document.createElement('span');
            span.className = type;
            span.textContent = message + '\n';
            logElement.appendChild(span);
        }

        // Initialize Emscripten Module
        NoeticsModule().then(instance => {
            statusElement.textContent = 'WASM Module Loaded Successfully.';
            statusElement.className = 'status success';
            
            try {
                const sdk = new NoeticsSDK(instance);
                log('--- Noetics SDK initialized ---');

                // 1. Create Context (dim=4, n_sectors=1)
                const dim = 4;
                const ctx = sdk.createContext(dim, 1);
                log(`Context created (dim=${dim})`, 'success');

                // 2. Create Parallel Key (K)
                const key = sdk.createKey(ctx);
                log(`Parallel Key (K) initialized at pointer: ${key}`);

                // 3. Compute Initial Energy
                // For Identity matrix, E = 0.5 * 4 = 2.0
                const energy = sdk.energy(key);
                log(`Initial Structural Energy: ${energy.toFixed(4)}`);

                if (Math.abs(energy - 2.0) < 1e-6) {
                    log('[SUCCESS] Energy calculation matches theoretical value (2.0).', 'success');
                } else {
                    log('[FAILURE] Energy calculation mismatch.', 'error');
                }

                log('\nPKGF Geometric Flow Engine is ready for web visualization.');

            } catch (err) {
                log(`Error during SDK test: ${err.message}`, 'error');
                console.error(err);
            }
        }).catch(err => {
            statusElement.textContent = 'Failed to load WASM module.';
            statusElement.className = 'status error';
            log(err.message, 'error');
        });
    </script>
</body>
</html>
